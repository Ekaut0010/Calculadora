<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
</head>

<body>
    <h1>Calculadora</h1>
    <section id="calculator">
        <div id="display-container">
            <input type="text" id="display" disabled>
        </div>
        <div class="buttons">
            <button id="btn7" class="number">7</button>
            <button id="btn8" class="number">8</button>
            <button id="btn9" class="number">9</button>
            <button id="btnAdd" class="operator">+</button>
        </div>
        <div class="buttons">
            <button id="btn4" class="number">4</button>
            <button id="btn5" class="number">5</button>
            <button id="btn6" class="number">6</button>
            <button id="btnSub" class="operator">-</button>
        </div>
        <div class="buttons">
            <button id="btn1" class="number">1</button>
            <button id="btn2" class="number">2</button>
            <button id="btn3" class="number">3</button>
            <button id="btnMult" class="operator">x</button>
        </div>
        <div class="buttons">
            <button id="btn0" class="number">0</button>
            <button id="btnDecimal" class="number">.</button>
            <button id="btnIgual" class="operator">=</button>
            <button id="btnDivide" class="operator">/</button>
        </div>
        <div class="buttons">
            <button id="btnClear" class="clear">C</button>
        </div>

    </section>
</body>

</html>
